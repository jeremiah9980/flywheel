name: flywheel

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, print what would be sent but don't send"
        required: false
        default: "false"

concurrency:
  group: flywheel
  cancel-in-progress: false

jobs:
  nudge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run flywheel
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_PAT:      ${{ secrets.AIRTABLE_PAT }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AIRTABLE_BASE_ID:  appVilJUh8vIlDFr8
          AIRTABLE_TABLE_ID: tbl4KjCdTacVTV784
          DRY_RUN: ${{ inputs.dry_run == 'true' && '1' || '0' }}
        run: python flywheel.py
